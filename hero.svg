<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#F0F4F8"/>

  <!-- 배경 원 장식 -->
  <circle cx="150" cy="380" r="180" fill="#E4EBF2"/>
  <circle cx="650" cy="80"  r="130" fill="#E4EBF2"/>

  <!-- ── 스마트폰 ── -->
  <!-- 폰 그림자 효과 (단순 offset rect) -->
  <rect x="118" y="60" width="190" height="330" rx="28" fill="#C8D4E0"/>
  <!-- 폰 바디 -->
  <rect x="112" y="54" width="190" height="330" rx="28" fill="#1C1C1E"/>
  <!-- 화면 베젤 -->
  <rect x="122" y="68" width="170" height="302" rx="18" fill="#000"/>
  <!-- 카메라 영역 (어두운 배경) -->
  <rect x="126" y="74" width="162" height="196" rx="12" fill="#0F1A2A"/>

  <!-- 옷 실루엣 (재킷) -->
  <path d="M178 230 L172 178 L196 166 L207 180 L218 166 L242 178 L236 230 L234 258 L180 258 Z" fill="#2A3F5F"/>
  <path d="M196 166 L207 180 L218 166" fill="none" stroke="#4A6491" stroke-width="2.5"/>
  <!-- 소매 -->
  <path d="M172 178 L148 202 L156 218 L178 196" fill="#2A3F5F" stroke="#3A5480" stroke-width="1.5"/>
  <path d="M242 178 L266 202 L258 218 L236 196" fill="#2A3F5F" stroke="#3A5480" stroke-width="1.5"/>

  <!-- 카메라 가이드 코너 -->
  <path d="M132 80  L132 74  L138 74"  fill="none" stroke="#2BAE66" stroke-width="3" stroke-linecap="round"/>
  <path d="M282 80  L282 74  L276 74"  fill="none" stroke="#2BAE66" stroke-width="3" stroke-linecap="round"/>
  <path d="M132 264 L132 270 L138 270" fill="none" stroke="#2BAE66" stroke-width="3" stroke-linecap="round"/>
  <path d="M282 264 L282 270 L276 270" fill="none" stroke="#2BAE66" stroke-width="3" stroke-linecap="round"/>

  <!-- 품목 인식 뱃지 (카메라 뷰 위) -->
  <rect x="150" y="80" width="114" height="22" rx="11" fill="rgba(43,174,102,0.85)"/>
  <text x="207" y="95" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">재킷 인식됨</text>

  <!-- 하단 UI 영역 -->
  <rect x="122" y="276" width="170" height="88" rx="0" fill="#111"/>
  <rect x="122" y="352" width="170" height="18" rx="0" fill="#111"/>

  <!-- 캡처 버튼 -->
  <circle cx="207" cy="320" r="22" fill="none" stroke="#555" stroke-width="2.5"/>
  <circle cx="207" cy="320" r="15" fill="#E5E5E5"/>
  <!-- 갤러리 버튼 -->
  <rect x="142" y="308" width="34" height="26" rx="6" fill="#2C2C2E"/>
  <rect x="145" y="311" width="28" height="20" rx="4" fill="#3A3A3C"/>
  <!-- 확인 버튼 -->
  <rect x="244" y="308" width="34" height="26" rx="6" fill="#2BAE66"/>
  <text x="261" y="325" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">확인</text>

  <!-- 홈 인디케이터 -->
  <rect x="172" y="366" width="70" height="5" rx="3" fill="#333"/>

  <!-- ── 중앙 화살표 & AI ── -->
  <path d="M318 220 Q380 180 430 220" fill="none" stroke="#2BAE66" stroke-width="3" marker-end="url(#a)"/>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2BAE66" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- AI 뱃지 -->
  <rect x="342" y="168" width="72" height="30" rx="15" fill="#2BAE66"/>
  <text x="378" y="188" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">AI 분석</text>
  <!-- 스파크 -->
  <text x="330" y="162" fill="#2BAE66" font-size="16" font-family="sans-serif">✦</text>
  <text x="410" y="156" fill="#2BAE66" font-size="11" font-family="sans-serif">✦</text>
  <text x="356" y="146" fill="#96E6BE" font-size="9"  font-family="sans-serif">✦</text>

  <!-- ── 결과 카드 ── -->
  <rect x="448" y="64" width="290" height="316" rx="24" fill="#fff"/>

  <!-- 카드 헤더 -->
  <rect x="448" y="64" width="290" height="72" rx="24" fill="#F8F8F8"/>
  <rect x="448" y="112" width="290" height="24" rx="0" fill="#F8F8F8"/>
  <text x="593" y="100" text-anchor="middle" fill="#888" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">총 예상 세탁비는</text>
  <text x="593" y="126" text-anchor="middle" fill="#FF3B30" font-size="22" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">27,800원</text>

  <!-- 구분선 -->
  <line x1="466" y1="150" x2="720" y2="150" stroke="#F0F0F0" stroke-width="1.5"/>

  <!-- 탭 -->
  <rect x="462" y="158" width="122" height="28" rx="10" fill="#111"/>
  <text x="523" y="177" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">일반 고객</text>
  <rect x="590" y="158" width="122" height="28" rx="10" fill="#F0F0F0"/>
  <text x="651" y="177" text-anchor="middle" fill="#999" font-size="12" font-family="-apple-system,BlinkMacSystemFont,sans-serif">구독 회원</text>

  <!-- 품목 행 1 -->
  <rect x="462" y="198" width="40" height="40" rx="8" fill="#F2F2F7"/>
  <text x="510" y="213" fill="#333" font-size="13" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">재킷</text>
  <text x="510" y="229" fill="#aaa" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">정가</text>
  <text x="714" y="223" text-anchor="end" fill="#111" font-size="14" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">8,500원</text>
  <line x1="462" y1="246" x2="720" y2="246" stroke="#F5F5F5" stroke-width="1"/>

  <!-- 품목 행 2 -->
  <rect x="462" y="254" width="40" height="40" rx="8" fill="#F2F2F7"/>
  <text x="510" y="269" fill="#333" font-size="13" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">티셔츠</text>
  <text x="510" y="285" fill="#aaa" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">정가</text>
  <text x="714" y="279" text-anchor="end" fill="#111" font-size="14" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">4,500원</text>
  <line x1="462" y1="302" x2="720" y2="302" stroke="#F5F5F5" stroke-width="1"/>

  <!-- 품목 행 3 -->
  <rect x="462" y="310" width="40" height="40" rx="8" fill="#F2F2F7"/>
  <text x="510" y="325" fill="#333" font-size="13" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">코트</text>
  <text x="510" y="341" fill="#aaa" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">정가</text>
  <text x="714" y="335" text-anchor="end" fill="#111" font-size="14" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">14,800원</text>

  <!-- 합계 -->
  <line x1="448" y1="358" x2="738" y2="358" stroke="#EBEBEB" stroke-width="1.5"/>
  <rect x="448" y="358" width="290" height="22" rx="0" fill="#fff"/>
  <rect x="448" y="358" width="290" height="22" rx="24" fill="#fff"/>
  <text x="466" y="377" fill="#111" font-size="14" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">합계</text>
  <text x="714" y="377" text-anchor="end" fill="#FF3B30" font-size="15" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">27,800원</text>
</svg>
